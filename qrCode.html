<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">

    <!-- Important: Js library to generate QR codes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Termina aqui o import -->

    <link rel="ICON" type="ICON" sizes="16x16" href="./app/img/Calculator_31111.ico">

    <link rel="stylesheet" href="/app/css/CodeGenerate.css">

    <title>Generate QR Code</title>
</head>

<body>

    <header>
        <div id="cabecalho">
            <img width="50" height="50" style="border-radius: 50%" src="./app/img/imagemIMC.jpeg" alt="imagem imc">
            <h1>Calculadora de IMC</h1>
            <a href="/index.html"><button>Home</button></a>
        </div>
    </header>

    <main>
        <div class="container ">
            <h2>Generate QR Code</h2>

            <form class="row g-3 needs-validation" novalidate>
                <label for="link" class="col-sm-2 col-form-label">Link</label>
                <div class="row mb-3">
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="link" value="https://calculadora-imc-v2-3.vercel.app/index.html" required>
                        <div class="acoes-qrcode">
                            <button type="button" class="btn btn-primary" onclick="gerarQRCode()">
                                🎯 Gerar QR Code
                            </button>
                        </div>
                        <div class="invalid-feedback">
                            Enter the URL you want to generate a QR code for.
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </main>
    <div id="qrcode"></div>


    <script type="text/javascript" src="./novOCodeGenerate.js"></script>

    <script>
        (() => {
            'use strict'

            // Fetch all the forms we want to apply custom Bootstrap validation styles to
            const forms = document.querySelectorAll('.needs-validation')

            // Loop over them and prevent submission
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }

                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>

</body>

</html>
